# Cloudflare Worker configuration for Chaprola Poll Proxy

name = "chaprola-poll-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Set this secret via: wrangler secret put CHAPROLA_API_KEY
# The value should be your Chaprola API key (starts with chp_)

# Cron trigger: consolidate votes and polls every 15 minutes
[triggers]
crons = ["*/15 * * * *"]

[vars]
# No public vars needed - API key is a secret
