<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Chaprola Poll</title>
  <link rel="stylesheet" href="styles.css">
    <!-- chp-auth-widget: chaprola-auth.js -->
    <script src="https://chaprola.org/chaprola-auth.js"></script>
    <script src="api/proxy.js"></script>
</head>
<body>
    <!-- BEGIN chp-auth-widget -->

<div id="chp-auth-bar" class="chp-auth-bar" aria-label="Account">
  <span id="chp-auth-identity" class="chp-auth-identity" hidden></span>
  <button id="chp-auth-login-btn" class="chp-auth-btn chp-auth-btn--primary" type="button" hidden>Log in</button>
  <button id="chp-auth-signup-btn" class="chp-auth-btn" type="button" hidden>Sign up</button>
  <button id="chp-auth-logout-btn" class="chp-auth-btn" type="button" hidden>Log out</button>
</div>

<dialog id="chp-auth-dialog" class="chp-auth-dialog">
  <form id="chp-auth-form" method="dialog" class="chp-auth-form">
    <h2 id="chp-auth-title">Log in</h2>
    <label>
      <span>Email</span>
      <input id="chp-auth-email" type="email" autocomplete="username" required>
    </label>
    <label>
      <span>Password</span>
      <input id="chp-auth-password" type="password" autocomplete="current-password" required minlength="8">
    </label>
    <label id="chp-auth-displayname-label" hidden>
      <span>Display name (optional)</span>
      <input id="chp-auth-displayname" type="text" autocomplete="nickname">
    </label>
    <div id="chp-auth-error" class="chp-auth-error" role="alert"></div>
    <div class="chp-auth-actions">
      <button value="cancel" class="chp-auth-btn">Cancel</button>
      <button id="chp-auth-submit" value="submit" class="chp-auth-btn chp-auth-btn--primary" type="submit">Log in</button>
    </div>
  </form>
</dialog>

<style>
  .chp-auth-bar {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 9999;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    font: 14px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .chp-auth-identity {
    padding: 0.2rem 0.6rem;
    color: #94a3b8;
    font-size: 0.85rem;
  }
  .chp-auth-btn {
    padding: 0.35rem 0.85rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
  }
  .chp-auth-btn:hover { background: #1e293b; }
  .chp-auth-btn--primary {
    background: #2563eb;
    border-color: #2563eb;
    color: white;
  }
  .chp-auth-btn--primary:hover { background: #1d4ed8; }
  .chp-auth-dialog {
    max-width: 360px;
    border: 1px solid #334155;
    background: #0b1220;
    color: #e2e8f0;
    border-radius: 10px;
    padding: 1.25rem;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .chp-auth-dialog::backdrop { background: rgba(0,0,0,0.5); }
  .chp-auth-form h2 { margin: 0 0 0.75rem; font-size: 1.25rem; color: #f1f5f9; }
  .chp-auth-form label { display: block; margin: 0.5rem 0; }
  .chp-auth-form label span { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.2rem; }
  .chp-auth-form input {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    border-radius: 6px;
    font: inherit;
    box-sizing: border-box;
  }
  .chp-auth-error {
    min-height: 1.2em;
    color: #fca5a5;
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }
  .chp-auth-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
</style>

<script>
(function () {
  var bar = document.getElementById('chp-auth-bar');
  var identity = document.getElementById('chp-auth-identity');
  var loginBtn = document.getElementById('chp-auth-login-btn');
  var signupBtn = document.getElementById('chp-auth-signup-btn');
  var logoutBtn = document.getElementById('chp-auth-logout-btn');
  var dialog = document.getElementById('chp-auth-dialog');
  var form = document.getElementById('chp-auth-form');
  var title = document.getElementById('chp-auth-title');
  var submit = document.getElementById('chp-auth-submit');
  var emailIn = document.getElementById('chp-auth-email');
  var passIn = document.getElementById('chp-auth-password');
  var nameLabel = document.getElementById('chp-auth-displayname-label');
  var nameIn = document.getElementById('chp-auth-displayname');
  var errorBox = document.getElementById('chp-auth-error');
  var mode = 'login';

  function waitForAuth() {
    if (window.chaprolaAuth) return Promise.resolve();
    return new Promise(function (resolve) {
      var tries = 0;
      var timer = setInterval(function () {
        if (window.chaprolaAuth || ++tries > 50) {
          clearInterval(timer);
          resolve();
        }
      }, 100);
    });
  }

  function render() {
    var user = window.chaprolaAuth && window.chaprolaAuth.getUser();
    if (user) {
      identity.hidden = false;
      identity.textContent = user.display_name || user.email || 'signed in';
      logoutBtn.hidden = false;
      loginBtn.hidden = true;
      signupBtn.hidden = true;
    } else {
      identity.hidden = true;
      logoutBtn.hidden = true;
      loginBtn.hidden = false;
      signupBtn.hidden = false;
    }
  }

  function openDialog(nextMode) {
    mode = nextMode;
    title.textContent = mode === 'signup' ? 'Sign up' : 'Log in';
    submit.textContent = mode === 'signup' ? 'Sign up' : 'Log in';
    nameLabel.hidden = mode !== 'signup';
    errorBox.textContent = '';
    form.reset();
    dialog.showModal();
  }

  form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    errorBox.textContent = '';
    submit.disabled = true;
    try {
      var body = { email: emailIn.value.trim(), password: passIn.value };
      if (mode === 'signup') {
        var dn = nameIn.value.trim();
        if (dn) body.display_name = dn;
        await window.chaprolaAuth.signup(body);
      } else {
        await window.chaprolaAuth.login(body);
      }
      await window.chaprolaAuth.me();
      dialog.close();
      render();
    } catch (err) {
      errorBox.textContent = (err && err.message) || String(err);
    } finally {
      submit.disabled = false;
    }
  });

  loginBtn.addEventListener('click', function () { openDialog('login'); });
  signupBtn.addEventListener('click', function () { openDialog('signup'); });
  logoutBtn.addEventListener('click', async function () {
    await window.chaprolaAuth.logout();
    render();
  });

  waitForAuth().then(function () {
    if (!window.chaprolaAuth) {
      bar.style.display = 'none';
      return;
    }
    window.chaprolaAuth.onAuthChange(render);
    window.chaprolaAuth.me().catch(function () {}).finally(render);
  });
})();
</script>
    <!-- END chp-auth-widget -->
  <header>
    <div class="container">
      <a href="./" class="logo">Chaprola<span>Poll</span></a>
      <nav>
        <a href="./">Browse Polls</a>
        <a href="create.html">Create Poll</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="results-container" class="loading">Loading results...</div>

    <noscript>
      <div class="message message-error">
        JavaScript is required to view live results. Please enable JavaScript.
      </div>
    </noscript>
  </main>

  <script>
    const API_BASE = 'https://api.chaprola.org';
    const USERID = 'chaprola-poll';
    const PROJECT = 'poll';

    let currentPollId = null;
    let refreshInterval = null;

    async function loadResults() {
      const container = document.getElementById('results-container');
      const params = new URLSearchParams(window.location.search);
      currentPollId = params.get('poll');
      const justVoted = params.get('voted') === '1';

      if (!currentPollId) {
        container.classList.remove('loading');
        container.innerHTML = '<div class="message message-error">No poll specified. <a href="./">Browse open polls</a></div>';
        return;
      }

      if (justVoted) {
        const newUrl = window.location.pathname + '?poll=' + encodeURIComponent(currentPollId);
        window.history.replaceState({}, '', newUrl);
      }

      await fetchAndRenderResults(justVoted);
      refreshInterval = setInterval(() => fetchAndRenderResults(false), 10000);
    }

    async function fetchAndRenderResults(showVoteSuccess) {
      const container = document.getElementById('results-container');

      try {
        // Get poll details from published report (public, no auth needed)
        const detailUrl = `${API_BASE}/report?userid=${USERID}&project=${PROJECT}&name=POLLDETAIL&poll_id=${encodeURIComponent(currentPollId)}`;
        const detailResponse = await fetch(detailUrl);
        const detailText = await detailResponse.text();
        const pollDetail = parsePollDetail(detailText);

        // Get results from published RESULTS report (TABULATE output)
        const resultsUrl = `${API_BASE}/report?userid=${USERID}&project=${PROJECT}&name=RESULTS&poll_id=${encodeURIComponent(currentPollId)}`;
        const resultsResponse = await fetch(resultsUrl);
        const resultsText = await resultsResponse.text();
        const pivotData = parsePivotJson(resultsText);

        container.classList.remove('loading');
        document.title = `Results: ${pollDetail?.title || currentPollId} - Chaprola Poll`;
        renderResults(container, pollDetail, pivotData, showVoteSuccess);

      } catch (error) {
        console.error('Failed to load results:', error);
        container.classList.remove('loading');
        container.innerHTML = `<div class="message message-error">Failed to load results. Please try again later.<br><small>${escapeHtml(error.message)}</small></div>`;
      }
    }

    function parsePivotJson(text) {
      try {
        const data = JSON.parse(text.trim());
        // TABULATE returns values as strings — parse to numbers
        if (data.values) {
          data.values = data.values.map(row => row.map(v => parseInt(v, 10) || 0));
        }
        // Compute row_totals and grand_total from values matrix
        data.row_totals = (data.values || []).map(row => row.reduce((sum, v) => sum + v, 0));
        data.grand_total = data.row_totals.reduce((sum, v) => sum + v, 0);
        return { pivot: data };
      } catch {
        return { pivot: { rows: [], columns: [], values: [], row_totals: [], grand_total: 0 } };
      }
    }

    function parsePollDetail(text) {
      // POLLDETAIL.CS emits pipe-delimited key|value lines. Split on the
      // first | only so the options list (internally pipe-delimited) stays
      // intact for the options handler.
      const lines = text.trim().split('\n').filter(line => line.trim());
      const data = {};
      for (const line of lines) {
        const idx = line.indexOf('|');
        if (idx < 0) continue;
        const key = line.substring(0, idx).trim().toLowerCase();
        const val = line.substring(idx + 1).trim();
        if (key === 'options') {
          data.options = val.split('|').map(o => o.trim()).filter(Boolean);
        } else {
          data[key] = val;
        }
      }
      return data.title ? data : null;
    }

    function renderResults(container, pollDetail, pivotData, showVoteSuccess) {
      let rows = pivotData.pivot.rows || [];
      let rowTotals = pivotData.pivot.row_totals || [];
      const grandTotal = pivotData.pivot.grand_total || 0;
      const columns = pivotData.pivot.columns || [];
      let values = pivotData.pivot.values || [];

      // Merge TABULATE rows (uppercased) with poll options (original case).
      // TABULATE uppercases grouping keys, so match case-insensitively
      // and prefer the poll definition's original casing.
      if (pollDetail?.options) {
        const emptyRow = columns.length > 0 ? columns.map(() => 0) : [0];
        // Replace TABULATE's uppercased row labels with original-case poll options
        for (let i = 0; i < rows.length; i++) {
          const match = pollDetail.options.find(o => o.toUpperCase() === rows[i].toUpperCase());
          if (match) rows[i] = match;
        }
        // Add any poll options that have 0 votes (not in TABULATE output)
        for (const opt of pollDetail.options) {
          if (!rows.some(r => r.toUpperCase() === opt.toUpperCase())) {
            rows.push(opt);
            rowTotals.push(0);
            values.push(emptyRow);
          }
        }
      }

      const maxCount = Math.max(...rowTotals, 1);

      // Build bar chart from pivot row_totals
      const barChart = rows.map((option, i) => {
        const count = rowTotals[i] || 0;
        const percentage = grandTotal > 0 ? Math.round((count / grandTotal) * 100) : 0;
        const barWidth = grandTotal > 0 ? Math.round((count / maxCount) * 100) : 0;
        const isWinner = count === Math.max(...rowTotals) && count > 0;

        return `
          <div class="result-row">
            <div class="result-label">
              <span class="result-option">${escapeHtml(option)}</span>
              <span class="result-count">${count} (${percentage}%)</span>
            </div>
            <div class="result-bar-bg">
              <div class="result-bar ${isWinner ? 'winner' : ''}" style="width: ${barWidth}%"></div>
            </div>
          </div>
        `;
      }).join('');

      // Build cross-tabulation table from pivot columns/values.
      // TABULATE prefixes column names with _; an unlabeled column comes back
      // as "_" and represents votes with no voter_tag — show it as "Anonymous"
      // so cross-tab totals reconcile with the bar chart.
      const namedColumns = columns.map(c => (c || '').trim()).filter(c => c !== '');
      const displayColumns = namedColumns.map(c => {
        if (c === '_') return 'Anonymous';
        const stripped = c.replace(/^_/, '');
        return stripped.charAt(0).toUpperCase() + stripped.slice(1).toLowerCase();
      });
      const hasGroups = namedColumns.length > 0;

      let crossTabHtml = '';
      if (hasGroups) {
        // Compute column totals
        const colTotals = namedColumns.map(col => {
          const ci = columns.findIndex(c => (c || '').trim() === col);
          return rows.reduce((sum, _, ri) => sum + (values[ri] && ci >= 0 ? values[ri][ci] || 0 : 0), 0);
        });

        crossTabHtml = `
          <h2>Votes by Group</h2>
          <p class="pivot-note">Aggregated server-side by Chaprola TABULATE</p>
          <div class="crosstab-scroll">
          <table class="crosstab">
            <thead>
              <tr>
                <th>Option</th>
                ${displayColumns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows.map((opt, ri) => `
                <tr>
                  <td>${escapeHtml(opt)}</td>
                  ${namedColumns.map(col => {
                    const ci = columns.findIndex(c => (c || '').trim() === col);
                    return `<td>${values[ri] && ci >= 0 ? values[ri][ci] || 0 : 0}</td>`;
                  }).join('')}
                </tr>
              `).join('')}
            </tbody>
            <tfoot>
              <tr>
                <td><strong>Total</strong></td>
                ${colTotals.map(t => `<td><strong>${t}</strong></td>`).join('')}
              </tr>
            </tfoot>
          </table>
          </div>
        `;
      }

      const baseUrl = window.location.href.replace(/[^\/]*(\?.*)?$/, '');
      const voteUrl = `${baseUrl}vote.html?poll=${encodeURIComponent(currentPollId)}`;

      // Delete button appears for every logged-in user; DELETEPOLL.CS
      // enforces ownership server-side (WHERE owner_sub EQ PARAM.user_id)
      // against the JWT-injected user_id and returns status|not_found
      // for non-owners. POLLDETAIL also withholds owner_sub so the
      // information leak that used to feed the spoof-delete attack
      // chain stays closed — defense in depth alongside the platform's
      // writable-/report Bearer requirement.
      const isLoggedIn = !!(window.chaprolaAuth && window.chaprolaAuth.getUser && window.chaprolaAuth.getUser());

      container.innerHTML = `
        ${showVoteSuccess ? '<div class="message message-success">Your vote has been recorded!</div>' : ''}
        <h1>${escapeHtml(pollDetail?.title || currentPollId)}</h1>
        ${pollDetail?.status === 'open'
          ? `<p><span class="status status-open">Open</span> <a href="vote.html?poll=${encodeURIComponent(currentPollId)}">Cast your vote</a></p>`
          : '<p><span class="status status-closed">Closed</span></p>'
        }
        <div class="total-votes">${grandTotal.toLocaleString()} vote${grandTotal !== 1 ? 's' : ''}</div>
        <div class="results-chart">${barChart}</div>
        ${crossTabHtml}
        <div class="share-box">
          <label>Share this poll:</label>
          <div class="share-url">
            <input type="text" id="share-url" value="${escapeHtml(voteUrl)}" readonly>
            <button type="button" class="btn btn-secondary btn-small" onclick="copyShareUrl()">Copy</button>
          </div>
          ${isLoggedIn ? `
          <div style="margin-top: 1rem; text-align: right;">
            <button type="button" class="btn btn-danger btn-small" onclick="deletePoll()">Delete Poll</button>
          </div>` : ''}
        </div>
      `;
    }

    const DELETE_TOKEN = 'act_78a0c653941758c2cdb1f73d4f25607c';

    async function deletePoll() {
      if (!confirm('Delete this poll and all its votes? This cannot be undone.')) return;

      const btn = document.querySelector('.btn-danger');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        // Three layers gate this delete:
        //   1. act_ token in the URL is the publish-side ACL.
        //   2. The platform requires a chp_user_ Bearer for any writable
        //      /report call and rejects URL user_id params (Tawni
        //      trust-model variant-4, 2026-04-23) — chaprolaAuth.fetch
        //      attaches the Bearer automatically.
        //   3. PARAM.user_id is auto-injected from the JWT sub, then
        //      DELETEPOLL.CS's WHERE owner_sub EQ PARAM.user_id matches
        //      only polls the caller actually owns.
        // The URL therefore carries no user_id — that surface was
        // spoofable; auto-inject is the trusted source.
        const url = `${API_BASE}/report?userid=${USERID}&project=${PROJECT}&name=DELETEPOLL&poll_id=${encodeURIComponent(currentPollId)}&token=${DELETE_TOKEN}`;
        const response = await window.chaprolaAuth.fetch(url);
        const text = await response.text();

        if (text.includes('status|ok') || text.includes('STATUS|OK')) {
          if (refreshInterval) clearInterval(refreshInterval);
          const container = document.getElementById('results-container');
          container.innerHTML = '<div class="message message-success">Poll deleted. <a href="./">Browse polls</a></div>';
        } else if (text.includes('status|not_found') || text.includes('STATUS|NOT_FOUND')) {
          throw new Error('Not found or not owned by you');
        } else {
          throw new Error('Delete failed: ' + text.slice(0, 120));
        }
      } catch (error) {
        btn.disabled = false;
        btn.textContent = 'Delete Poll';
        alert('Failed to delete poll: ' + error.message);
      }
    }

    function copyShareUrl() {
      const input = document.getElementById('share-url');
      input.select();
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = input.nextElementSibling;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadResults();
    window.addEventListener('beforeunload', () => { if (refreshInterval) clearInterval(refreshInterval); });
  </script>
</body>
</html>
