<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Chaprola Poll</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Chaprola Poll</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/create.html">Create Poll</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="vote-container">
            <div id="vote-content">
                <div class="loading">Loading poll...</div>
            </div>
        </div>
    </main>

    <footer>
        <p>Powered by <a href="https://chaprola.org" target="_blank">Chaprola</a></p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('vote-content');
            const pollId = getQueryParam('poll');

            if (!pollId) {
                container.innerHTML = '<p class="error">No poll specified. <a href="/">Go back to home</a></p>';
                return;
            }

            try {
                const poll = await fetchPollDetail(pollId);

                if (!poll.title) {
                    container.innerHTML = '<p class="error">Poll not found. <a href="/">Go back to home</a></p>';
                    return;
                }

                if (poll.status !== 'open') {
                    container.innerHTML = `
                        <h1>${escapeHtml(poll.title)}</h1>
                        <p class="error">This poll is closed.</p>
                        <p><a href="/results.html?poll=${pollId}" class="btn btn-primary">View Results</a></p>
                    `;
                    return;
                }

                container.innerHTML = `
                    <h1>${escapeHtml(poll.title)}</h1>
                    <form class="vote-form" id="vote-form">
                        <div class="option-group">
                            ${poll.options.map((option, i) => `
                                <div class="option-item" onclick="this.querySelector('input').checked = true; document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected')); this.classList.add('selected');">
                                    <input type="radio" name="option" id="option-${i}" value="${escapeHtml(option)}" required>
                                    <label for="option-${i}">${escapeHtml(option)}</label>
                                </div>
                            `).join('')}
                        </div>

                        <div class="voter-tag-group">
                            <label for="voter-tag">Team or group name (optional)</label>
                            <input type="text" id="voter-tag" name="voter_tag" placeholder="e.g., engineering, design, product" maxlength="50">
                        </div>

                        <button type="submit" class="btn btn-primary">Submit Vote</button>
                    </form>
                `;

                document.getElementById('vote-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const option = form.option.value;
                    const voterTag = form.voter_tag.value.trim();
                    const submitBtn = form.querySelector('button[type="submit"]');

                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';

                    try {
                        await submitVote(pollId, option, voterTag);
                        window.location.href = `/results.html?poll=${pollId}&voted=true`;
                    } catch (error) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Submit Vote';
                        alert('Failed to submit vote: ' + error.message);
                    }
                });
            } catch (error) {
                container.innerHTML = `<p class="error">Failed to load poll: ${escapeHtml(error.message)}</p>`;
            }
        });
    </script>
</body>
</html>
