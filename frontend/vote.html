<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote - Chaprola Poll</title>
  <link rel="stylesheet" href="styles.css">
  <script src="api/proxy.js"></script>
    <!-- chp-auth-widget: chaprola-auth.js -->
    <script src="https://chaprola.org/chaprola-auth.js"></script>
</head>
<body>
    <!-- BEGIN chp-auth-widget -->

<div id="chp-auth-bar" class="chp-auth-bar" aria-label="Account">
  <span id="chp-auth-identity" class="chp-auth-identity" hidden></span>
  <button id="chp-auth-login-btn" class="chp-auth-btn chp-auth-btn--primary" type="button" hidden>Log in</button>
  <button id="chp-auth-signup-btn" class="chp-auth-btn" type="button" hidden>Sign up</button>
  <button id="chp-auth-logout-btn" class="chp-auth-btn" type="button" hidden>Log out</button>
</div>

<dialog id="chp-auth-dialog" class="chp-auth-dialog">
  <form id="chp-auth-form" method="dialog" class="chp-auth-form">
    <h2 id="chp-auth-title">Log in</h2>
    <label>
      <span>Email</span>
      <input id="chp-auth-email" type="email" autocomplete="username" required>
    </label>
    <label>
      <span>Password</span>
      <input id="chp-auth-password" type="password" autocomplete="current-password" required minlength="8">
    </label>
    <label id="chp-auth-displayname-label" hidden>
      <span>Display name (optional)</span>
      <input id="chp-auth-displayname" type="text" autocomplete="nickname">
    </label>
    <div id="chp-auth-error" class="chp-auth-error" role="alert"></div>
    <div class="chp-auth-actions">
      <button value="cancel" class="chp-auth-btn">Cancel</button>
      <button id="chp-auth-submit" value="submit" class="chp-auth-btn chp-auth-btn--primary" type="submit">Log in</button>
    </div>
  </form>
</dialog>

<style>
  .chp-auth-bar {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 9999;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    font: 14px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .chp-auth-identity {
    padding: 0.2rem 0.6rem;
    color: #94a3b8;
    font-size: 0.85rem;
  }
  .chp-auth-btn {
    padding: 0.35rem 0.85rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
  }
  .chp-auth-btn:hover { background: #1e293b; }
  .chp-auth-btn--primary {
    background: #2563eb;
    border-color: #2563eb;
    color: white;
  }
  .chp-auth-btn--primary:hover { background: #1d4ed8; }
  .chp-auth-dialog {
    max-width: 360px;
    border: 1px solid #334155;
    background: #0b1220;
    color: #e2e8f0;
    border-radius: 10px;
    padding: 1.25rem;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .chp-auth-dialog::backdrop { background: rgba(0,0,0,0.5); }
  .chp-auth-form h2 { margin: 0 0 0.75rem; font-size: 1.25rem; color: #f1f5f9; }
  .chp-auth-form label { display: block; margin: 0.5rem 0; }
  .chp-auth-form label span { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.2rem; }
  .chp-auth-form input {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    border-radius: 6px;
    font: inherit;
    box-sizing: border-box;
  }
  .chp-auth-error {
    min-height: 1.2em;
    color: #fca5a5;
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }
  .chp-auth-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
</style>

<script>
(function () {
  var bar = document.getElementById('chp-auth-bar');
  var identity = document.getElementById('chp-auth-identity');
  var loginBtn = document.getElementById('chp-auth-login-btn');
  var signupBtn = document.getElementById('chp-auth-signup-btn');
  var logoutBtn = document.getElementById('chp-auth-logout-btn');
  var dialog = document.getElementById('chp-auth-dialog');
  var form = document.getElementById('chp-auth-form');
  var title = document.getElementById('chp-auth-title');
  var submit = document.getElementById('chp-auth-submit');
  var emailIn = document.getElementById('chp-auth-email');
  var passIn = document.getElementById('chp-auth-password');
  var nameLabel = document.getElementById('chp-auth-displayname-label');
  var nameIn = document.getElementById('chp-auth-displayname');
  var errorBox = document.getElementById('chp-auth-error');
  var mode = 'login';

  function waitForAuth() {
    if (window.chaprolaAuth) return Promise.resolve();
    return new Promise(function (resolve) {
      var tries = 0;
      var timer = setInterval(function () {
        if (window.chaprolaAuth || ++tries > 50) {
          clearInterval(timer);
          resolve();
        }
      }, 100);
    });
  }

  function render() {
    var user = window.chaprolaAuth && window.chaprolaAuth.getUser();
    if (user) {
      identity.hidden = false;
      identity.textContent = user.display_name || user.email || 'signed in';
      logoutBtn.hidden = false;
      loginBtn.hidden = true;
      signupBtn.hidden = true;
    } else {
      identity.hidden = true;
      logoutBtn.hidden = true;
      loginBtn.hidden = false;
      signupBtn.hidden = false;
    }
  }

  function openDialog(nextMode) {
    mode = nextMode;
    title.textContent = mode === 'signup' ? 'Sign up' : 'Log in';
    submit.textContent = mode === 'signup' ? 'Sign up' : 'Log in';
    nameLabel.hidden = mode !== 'signup';
    errorBox.textContent = '';
    form.reset();
    dialog.showModal();
  }

  form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    errorBox.textContent = '';
    submit.disabled = true;
    try {
      var body = { email: emailIn.value.trim(), password: passIn.value };
      if (mode === 'signup') {
        var dn = nameIn.value.trim();
        if (dn) body.display_name = dn;
        await window.chaprolaAuth.signup(body);
      } else {
        await window.chaprolaAuth.login(body);
      }
      await window.chaprolaAuth.me();
      dialog.close();
      render();
    } catch (err) {
      errorBox.textContent = (err && err.message) || String(err);
    } finally {
      submit.disabled = false;
    }
  });

  loginBtn.addEventListener('click', function () { openDialog('login'); });
  signupBtn.addEventListener('click', function () { openDialog('signup'); });
  logoutBtn.addEventListener('click', async function () {
    await window.chaprolaAuth.logout();
    render();
  });

  waitForAuth().then(function () {
    if (!window.chaprolaAuth) {
      bar.style.display = 'none';
      return;
    }
    window.chaprolaAuth.onAuthChange(render);
    window.chaprolaAuth.me().catch(function () {}).finally(render);
  });
})();
</script>
    <!-- END chp-auth-widget -->
  <header>
    <div class="container">
      <a href="./" class="logo">Chaprola<span>Poll</span></a>
      <nav>
        <a href="./">Browse Polls</a>
        <a href="create.html">Create Poll</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="vote-container" class="loading">Loading poll...</div>

    <noscript>
      <div class="message message-error">
        JavaScript is required to vote. Please enable JavaScript.
      </div>
    </noscript>
  </main>

  <script>
    const API_BASE = 'https://api.chaprola.org';
    const USERID = 'chaprola-poll';
    const PROJECT = 'poll';

    let currentPoll = null;

    async function loadPoll() {
      const container = document.getElementById('vote-container');
      const params = new URLSearchParams(window.location.search);
      const pollId = params.get('poll');

      if (!pollId) {
        container.classList.remove('loading');
        container.innerHTML = `
          <div class="message message-error">
            No poll specified. <a href="./">Browse open polls</a>
          </div>
        `;
        return;
      }

      try {
        const url = `${API_BASE}/report?userid=${USERID}&project=${PROJECT}&name=POLLDETAIL&poll_id=${encodeURIComponent(pollId)}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();
        currentPoll = parsePollDetail(text, pollId);

        container.classList.remove('loading');

        if (!currentPoll) {
          container.innerHTML = `
            <div class="message message-error">
              Poll not found. <a href="./">Browse open polls</a>
            </div>
          `;
          return;
        }

        document.title = `Vote: ${currentPoll.title} - Chaprola Poll`;
        renderVoteForm(container);

      } catch (error) {
        console.error('Failed to load poll:', error);
        container.classList.remove('loading');
        container.innerHTML = `
          <div class="message message-error">
            Failed to load poll. Please try again later.
            <br><small>${escapeHtml(error.message)}</small>
          </div>
        `;
      }
    }

    function parsePollDetail(text, pollId) {
      const lines = text.trim().split('\n').filter(line => line.trim());
      const data = { poll_id: pollId };

      // Chaprola reports append the key field (poll_id) at the end of each line.
      // The current implementation appends it TWICE with whitespace, so strip multiple times.
      function cleanValue(val) {
        const escapedPollId = pollId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp('\\s+' + escapedPollId + '\\s*$');
        // Run replacement twice to handle double appending
        let cleaned = val.replace(regex, '').trim();
        cleaned = cleaned.replace(regex, '').trim();
        return cleaned;
      }

      for (const line of lines) {
        if (line.startsWith('TITLE|')) {
          data.title = cleanValue(line.substring(6));
        } else if (line.startsWith('OPTIONS|')) {
          const raw = cleanValue(line.substring(8));
          data.options = raw.split('|').map(o => o.trim()).filter(o => o);
        } else if (line.startsWith('STATUS|')) {
          data.status = cleanValue(line.substring(7));
        }
      }

      if (!data.title || !data.options) {
        return null;
      }

      return data;
    }

    function renderVoteForm(container) {
      const isClosed = currentPoll.status !== 'open';
      const hasVoted = localStorage.getItem(`voted_${currentPoll.poll_id}`) === 'true';

      container.innerHTML = `
        <h1>${escapeHtml(currentPoll.title)}</h1>

        ${hasVoted ? `
          <div class="message message-success">
            You have already voted in this poll. <a href="results.html?poll=${encodeURIComponent(currentPoll.poll_id)}">View results</a>
          </div>
        ` : isClosed ? `
          <div class="message message-error">
            This poll is closed. <a href="results.html?poll=${encodeURIComponent(currentPoll.poll_id)}">View results</a>
          </div>
        ` : `
          <form id="vote-form">
            <div class="form-group">
              <label>Choose your option:</label>
              <div class="vote-options">
                ${currentPoll.options.map((opt, i) => `
                  <label class="vote-option" data-option="${i}">
                    <input type="radio" name="option" value="${escapeHtml(opt)}" required>
                    <span>${escapeHtml(opt)}</span>
                  </label>
                `).join('')}
              </div>
            </div>

            <div class="form-group">
              <label for="voter-tag">Team or group name (optional)</label>
              <input type="text" id="voter-tag" name="voter_tag" placeholder="e.g., engineering, design, product">
            </div>

            <button type="submit" class="btn btn-primary">Submit Vote</button>
          </form>

          <div id="vote-message" style="display: none;"></div>
        `}
      `;

      if (!isClosed && !hasVoted) {
        setupVoteForm();
      }
    }

    function setupVoteForm() {
      const form = document.getElementById('vote-form');
      const options = document.querySelectorAll('.vote-option');

      // Highlight selected option
      options.forEach(opt => {
        opt.addEventListener('click', () => {
          options.forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
        });
      });

      // Handle form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Check if user has already voted (handles browser back button case)
        if (localStorage.getItem(`voted_${currentPoll.poll_id}`) === 'true') {
          form.style.display = 'none';
          showMessage('You have already voted in this poll. Redirecting to results...', 'error');
          setTimeout(() => {
            window.location.href = `results.html?poll=${encodeURIComponent(currentPoll.poll_id)}`;
          }, 2000);
          return;
        }

        const formData = new FormData(form);
        const option = formData.get('option');
        const voterTag = formData.get('voter_tag') || '';

        if (!option) {
          showMessage('Please select an option.', 'error');
          return;
        }

        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          // Add timeout to prevent hanging
          const votePromise = ChaprolaProxy.vote(currentPoll.poll_id, option, voterTag);
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Request timed out')), 30000)
          );

          await Promise.race([votePromise, timeoutPromise]);

          // Mark as voted in localStorage
          localStorage.setItem(`voted_${currentPoll.poll_id}`, 'true');

          // Redirect to results
          window.location.href = `results.html?poll=${encodeURIComponent(currentPoll.poll_id)}&voted=1`;

        } catch (error) {
          console.error('Failed to submit vote:', error);
          showMessage(`Failed to submit vote: ${error.message}`, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Vote';
        }
      });
    }

    function showMessage(text, type) {
      const messageEl = document.getElementById('vote-message');
      messageEl.className = `message message-${type}`;
      messageEl.textContent = text;
      messageEl.style.display = 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load poll on page load
    loadPoll();
  </script>
</body>
</html>
