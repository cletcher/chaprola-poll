<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Poll - Chaprola Poll</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Chaprola Poll</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/create.html">Create Poll</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="create-container">
            <h1>Create a New Poll</h1>
            <div id="create-content">
                <form class="create-form" id="create-form">
                    <div class="form-group">
                        <label for="title">Poll Title</label>
                        <input type="text" id="title" name="title" placeholder="What do you want to ask?" required maxlength="100">
                    </div>

                    <div class="form-group">
                        <label>Options</label>
                        <div class="options-list" id="options-list">
                            <div class="option-input-row">
                                <input type="text" name="option" placeholder="Option 1" required maxlength="100">
                                <button type="button" class="btn btn-remove" onclick="removeOption(this)" disabled>Remove</button>
                            </div>
                            <div class="option-input-row">
                                <input type="text" name="option" placeholder="Option 2" required maxlength="100">
                                <button type="button" class="btn btn-remove" onclick="removeOption(this)" disabled>Remove</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-add-option" onclick="addOption()">+ Add Option</button>
                    </div>

                    <div class="form-group">
                        <label for="created_by">Your Name or Email</label>
                        <input type="text" id="created_by" name="created_by" placeholder="Optional - for your reference" maxlength="50">
                    </div>

                    <button type="submit" class="btn btn-primary">Create Poll</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>Powered by <a href="https://chaprola.org" target="_blank">Chaprola</a></p>
    </footer>

    <script src="app.js"></script>
    <script>
        let optionCount = 2;

        function updateRemoveButtons() {
            const rows = document.querySelectorAll('.option-input-row');
            rows.forEach(row => {
                const btn = row.querySelector('.btn-remove');
                btn.disabled = rows.length <= 2;
            });
        }

        function addOption() {
            if (optionCount >= 10) {
                alert('Maximum 10 options allowed');
                return;
            }
            optionCount++;
            const list = document.getElementById('options-list');
            const row = document.createElement('div');
            row.className = 'option-input-row';
            row.innerHTML = `
                <input type="text" name="option" placeholder="Option ${optionCount}" required maxlength="100">
                <button type="button" class="btn btn-remove" onclick="removeOption(this)">Remove</button>
            `;
            list.appendChild(row);
            updateRemoveButtons();
            row.querySelector('input').focus();
        }

        function removeOption(btn) {
            const rows = document.querySelectorAll('.option-input-row');
            if (rows.length <= 2) return;

            btn.parentElement.remove();
            optionCount--;

            // Update placeholders
            document.querySelectorAll('.option-input-row input').forEach((input, i) => {
                input.placeholder = `Option ${i + 1}`;
            });

            updateRemoveButtons();
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const title = form.title.value.trim();
            const createdBy = form.created_by.value.trim() || 'anonymous';
            const optionInputs = form.querySelectorAll('input[name="option"]');
            const options = Array.from(optionInputs)
                .map(input => input.value.trim())
                .filter(opt => opt);

            if (options.length < 2) {
                alert('Please provide at least 2 options');
                return;
            }

            // Check for duplicate options
            const uniqueOptions = new Set(options.map(o => o.toLowerCase()));
            if (uniqueOptions.size !== options.length) {
                alert('Please remove duplicate options');
                return;
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            try {
                const result = await createPoll(title, options, createdBy);
                const voteUrl = `${window.location.origin}/vote.html?poll=${result.pollId}`;
                const resultsUrl = `${window.location.origin}/results.html?poll=${result.pollId}`;

                document.getElementById('create-content').innerHTML = `
                    <div class="success-message">
                        <h2>Poll Created!</h2>
                        <p>Share this link to start collecting votes:</p>
                        <div class="share-link">${escapeHtml(voteUrl)}</div>
                        <div class="share-actions">
                            <button class="btn btn-secondary" onclick="navigator.clipboard.writeText('${voteUrl}'); this.textContent='Copied!';">Copy Link</button>
                            <a href="${voteUrl}" class="btn btn-vote">Vote Now</a>
                            <a href="${resultsUrl}" class="btn btn-results">View Results</a>
                        </div>
                    </div>
                `;
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Poll';
                alert('Failed to create poll: ' + error.message);
            }
        });
    </script>
</body>
</html>
